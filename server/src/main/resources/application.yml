spring:
  application:
    name: nexus-flow-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexusdb}
    username: ${SPRING_DATASOURCE_USERNAME:nexus}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  outbox:
    enabled: ${APP_OUTBOX_ENABLED:true}
    publish-delay-ms: ${APP_OUTBOX_PUBLISH_DELAY_MS:5000}
    batch-size: ${APP_OUTBOX_BATCH_SIZE:25}
    max-attempts: ${APP_OUTBOX_MAX_ATTEMPTS:8}

seed:
  enabled: ${SEED_ENABLED:true}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId:-}]"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    defaults:
      enabled: true

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
